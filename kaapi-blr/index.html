<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4D7C52">
  <meta name="description" content="Discover the best coffee spots in Bengaluru — specialty cafes, filter coffee, roasteries and hidden gems.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kaapi">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta property="og:title" content="Kaapi BLR — Bengaluru Coffee Guide">
  <meta property="og:description" content="Specialty cafes, filter coffee, roasteries and hidden gems across Bengaluru.">
  <meta property="og:type" content="website">
  <title>Kaapi BLR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- SVG icon sprite -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="ic-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
  </symbol>
  <symbol id="ic-map" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
    <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
  </symbol>
  <symbol id="ic-discover" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
  </symbol>
  <symbol id="ic-bookmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
  </symbol>
  <symbol id="ic-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </symbol>
  <symbol id="ic-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>
  <symbol id="ic-star" viewBox="0 0 24 24" fill="currentColor">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
  </symbol>
  <symbol id="ic-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
  </symbol>
  <symbol id="ic-instagram" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
    <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/>
    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
  </symbol>
  <symbol id="ic-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
    <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
  </symbol>
  <symbol id="ic-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
  </symbol>
  <symbol id="ic-heart-filled" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
  </symbol>
  <symbol id="ic-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </symbol>
  <symbol id="ic-install" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
  </symbol>
</svg>

<div id="app">

  <!-- Splash -->
  <div id="splash" class="splash" role="status" aria-label="Loading Kaapi BLR">
    <svg class="splash-logo" viewBox="0 0 72 72" width="72" height="72" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#4D7C52"/>
      <circle cx="36" cy="36" r="26" fill="none" stroke="#F7F3ED" stroke-width="1.5" opacity="0.25"/>
      <path d="M 20 44 L 52 44 L 48 56 Q 44 62 38 62 L 34 62 Q 28 62 24 56 Z" fill="#F7F3ED" opacity="0.95"/>
      <rect x="20" y="40" width="32" height="7" rx="3.5" fill="#F7F3ED" opacity="0.95"/>
      <path d="M 52 43 Q 62 43 62 52 Q 62 61 52 61" fill="none" stroke="#F7F3ED" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
      <path d="M 29 37 Q 25 29 29 21 Q 33 13 29 5"  fill="none" stroke="#F7F3ED" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M 36 37 Q 32 28 36 19 Q 40 10 36 1"  fill="none" stroke="#F7F3ED" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M 43 37 Q 39 29 43 21 Q 47 13 43 5"  fill="none" stroke="#F7F3ED" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </svg>
    <div class="splash-name">Kaapi</div>
    <div class="splash-tagline">Bengaluru · Coffee Guide</div>
    <!-- Decorative leaf shapes -->
    <svg class="splash-leaf" style="position:absolute;top:10%;left:5%;width:80px;opacity:0.06" viewBox="0 0 80 120" aria-hidden="true">
      <path d="M 40 110 Q 5 80 5 40 Q 5 5 40 5 Q 75 5 75 40 Q 75 80 40 110 Z" fill="#4D7C52"/>
    </svg>
    <svg class="splash-leaf" style="position:absolute;bottom:12%;right:6%;width:60px;opacity:0.06;transform:rotate(130deg)" viewBox="0 0 80 120" aria-hidden="true">
      <path d="M 40 110 Q 5 80 5 40 Q 5 5 40 5 Q 75 5 75 40 Q 75 80 40 110 Z" fill="#4D7C52"/>
    </svg>
  </div>

  <!-- App shell -->
  <div id="app-shell" class="app-shell hidden">

    <!-- Header -->
    <header class="app-header" role="banner">
      <div class="header-main">
        <div class="brand" id="brand-logo" role="img" aria-label="Kaapi BLR">
          <svg class="brand-icon" viewBox="0 0 36 36" width="36" height="36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="18" cy="18" r="17" fill="#4D7C52"/>
            <path d="M 10 22 L 26 22 L 24 30 Q 21 34 18 34 Q 15 34 12 30 Z" fill="#F7F3ED" opacity="0.96"/>
            <rect x="10" y="19" width="16" height="5" rx="2.5" fill="#F7F3ED" opacity="0.96"/>
            <path d="M 26 22 Q 32 22 32 27 Q 32 32 26 32" fill="none" stroke="#F7F3ED" stroke-width="2.5" stroke-linecap="round" opacity="0.96"/>
            <path d="M 14 17 Q 11 12 14 7"  fill="none" stroke="#F7F3ED" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
            <path d="M 18 17 Q 15 11 18 5"  fill="none" stroke="#F7F3ED" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
            <path d="M 22 17 Q 19 12 22 7"  fill="none" stroke="#F7F3ED" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
          </svg>
          <div class="brand-text">
            <span class="brand-name">Kaapi</span>
            <span class="brand-loc">
              <svg class="icon" width="10" height="10" aria-hidden="true"><use href="#ic-pin"/></svg>
              Bengaluru
            </span>
          </div>
        </div>
        <div class="header-actions">
          <button id="btn-search" class="icon-btn" aria-label="Search cafes" aria-expanded="false">
            <svg class="icon" width="20" height="20" aria-hidden="true"><use href="#ic-search"/></svg>
          </button>
          <button id="btn-install" class="install-btn hidden" aria-label="Install app">
            <svg class="icon" width="15" height="15" aria-hidden="true"><use href="#ic-install"/></svg>
            Install
          </button>
        </div>
      </div>

      <!-- Search bar (shown on demand) -->
      <div id="search-bar" class="search-bar hidden" role="search">
        <div class="search-input-wrap">
          <svg class="icon search-icon" width="17" height="17" aria-hidden="true"><use href="#ic-search"/></svg>
          <input type="search" id="search-input" class="search-input"
            placeholder="Cafes, areas, vibes..." autocomplete="off" autocorrect="off"
            aria-label="Search coffee spots">
        </div>
        <button id="btn-search-close" class="search-cancel">Cancel</button>
      </div>

      <!-- Filter chips -->
      <div class="filter-bar" role="toolbar" aria-label="Filter cafes">
        <div class="chips-track" id="chips-track">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="near">
            <svg class="icon" width="11" height="11" aria-hidden="true"><use href="#ic-pin"/></svg> Near me
          </button>
          <button class="chip" data-filter="specialty">Specialty</button>
          <button class="chip" data-filter="work">Work-friendly</button>
          <button class="chip" data-filter="roastery">Roastery</button>
          <button class="chip" data-filter="matcha">Matcha</button>
          <button class="chip" data-filter="filter-coffee">Filter coffee</button>
          <button class="chip" data-filter="outdoor">Outdoor</button>
        </div>
      </div>
    </header>

    <!-- Main content area -->
    <main class="main-content" id="main-content" role="main">

      <!-- Home: cafe list -->
      <div id="home-view" class="view active" aria-label="Coffee spot list">
        <div class="section-intro" id="home-intro">
          <h1 class="section-title">Find your cup</h1>
          <p class="section-sub" id="result-count">10 spots in Bengaluru</p>
        </div>
        <div class="cafe-grid" id="cafe-grid" role="list" aria-label="Cafe listings"></div>
      </div>

      <!-- Map view -->
      <div id="map-view" class="view" aria-label="Map of Bengaluru coffee spots">
        <div id="leaflet-map"></div>
      </div>

      <!-- Discover / Instagram view -->
      <div id="discover-view" class="view" aria-label="Trending cafes on Instagram">
        <div id="discover-content"></div>
      </div>

      <!-- Saved view -->
      <div id="saved-view" class="view" aria-label="Your saved cafes">
        <div id="saved-content"></div>
      </div>

    </main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="App navigation">
      <button class="nav-btn active" data-view="home" aria-label="Home" aria-current="page">
        <svg class="icon icon-lg" aria-hidden="true"><use href="#ic-home"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-view="map" aria-label="Map">
        <svg class="icon icon-lg" aria-hidden="true"><use href="#ic-map"/></svg>
        <span>Map</span>
      </button>
      <button class="nav-btn" data-view="discover" aria-label="Discover">
        <svg class="icon icon-lg" aria-hidden="true"><use href="#ic-discover"/></svg>
        <span>Discover</span>
      </button>
      <button class="nav-btn" data-view="saved" aria-label="Saved">
        <svg class="icon icon-lg" aria-hidden="true"><use href="#ic-bookmark"/></svg>
        <span>Saved</span>
      </button>
    </nav>

  </div><!-- /app-shell -->

  <!-- Cafe detail modal -->
  <div id="cafe-modal" class="cafe-modal hidden" role="dialog" aria-modal="true" aria-label="Cafe details">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet" id="modal-sheet">
      <div class="modal-handle" aria-hidden="true"></div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Add-to-home-screen prompt -->
  <div id="a2hs-prompt" class="a2hs-prompt hidden" role="complementary" aria-label="Install app prompt">
    <svg class="a2hs-icon icon" width="22" height="22" aria-hidden="true"><use href="#ic-install"/></svg>
    <div class="a2hs-text">
      <strong>Add to home screen</strong>
      <span>Open Kaapi like a native app</span>
    </div>
    <button id="a2hs-ok" class="a2hs-ok">Add</button>
    <button id="a2hs-dismiss" class="a2hs-dismiss" aria-label="Dismiss install prompt">
      <svg class="icon" width="16" height="16" aria-hidden="true"><use href="#ic-x"/></svg>
    </button>
  </div>

</div><!-- /app -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/cafes.js"></script>
<script src="js/app.js"></script>
</body>
</html>
